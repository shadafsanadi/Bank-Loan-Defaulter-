version: "3.9"

services:
  api:
    build:
      context: .
      target: api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models:ro      # Mount trained models (read-only)
      - ./configs:/app/configs:ro
    environment:
      - LOG_LEVEL=INFO
      - MODEL_VERSION=v2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  app:
    build:
      context: .
      target: app
    ports:
      - "8501:8501"
    volumes:
      - ./models:/app/models:ro
      - ./configs:/app/configs:ro
      - ./outputs:/app/outputs:ro   # Pre-generated performance plots
    environment:
      - LOG_LEVEL=INFO
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
